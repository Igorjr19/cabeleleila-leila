services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cabeleleila
      POSTGRES_PASSWORD: cabeleleila123
      POSTGRES_DB: cabeleleila_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cabeleleila -d cabeleleila_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
